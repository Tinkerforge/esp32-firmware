[env:warp4_provisioning]
extends = env:warp4

lib_deps = ${base_esp32_ethernet.lib_deps}
           https://github.com/Tinkerforge/libcbv2g

custom_provisioning = true

custom_options = ${env:warp4.custom_options}
                 esp32_common_enable_secure_boot_api = 1 ; Provisioning only
                 esp32_common_dump_default_wifi_passphrase = 1 ; Provisioning only
                 factory_data_enable_write_api = 1 ; Provisioning only

custom_backend_modules = ESP32 Common
                         ESP32 Ethernet Brick
                         EVSE V2
                         Evse Common
                         Meters
                         Debug Protocol
                         CM Networking
                         Network
                         NTP
                         Ethernet
                         Wifi
                         Http
                         WS
                         Event
                         Firmware Update
                         Hidden Proxy
                         Coredump
                         ISO15118
                         ESP32 Ethernet V2 Co Bricklet
                         Factory Data

custom_frontend_modules = Firmware Update

custom_frontend_components = Firmware Update

custom_frontend_status_components =
