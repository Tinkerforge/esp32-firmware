[project]
name = "esp32"
dynamic = ["version"]
requires-python = "==3.12.*"
dependencies = [
    # firmware build
    "platformio",
    "pyphen",
    "tinkerforge >= 2.1.31", # 2.1.31 adds Industrial Dual AC In Bricklet
    "tinkerforge_util == 1.2.2", # > 1.2.2 has a not yet fixed incompatibily with Windows

    # SunSpec model parser
    "Xlsx2csv",

    # web/server.py
    "flask",
    "flask_sock",
    "websocket",

    # test_runner
    "junit-xml",
    "esptool",
    "jsonpath-ng"
]
